name: Deploy Release
on:
  release:
    types:
      - published
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Installs the toolchain pinned in mise.toml (node for vsce, uv for the
      # prepublish build).
      - uses: jdx/mise-action@v2

      - run: npm install

      - run: uv sync

      - run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
