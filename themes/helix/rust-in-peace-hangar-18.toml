# rust-in-peace-hangar-18 — a Helix theme from the Megadeth "Rust in Peace" cover palette.
# Generated from the src/ palettes by scripts/targets/helix.py (just build-themes).
# Do not edit by hand: edit the palette and rebuild.
inherits = "tokyonight"

# Syntax roles mirror the rust-in-peace VSCode theme (original structure):
#   keywords / operators / delimiters / tags = electric tube blue
#   functions / decorators = glow green      strings  = logo gold
#   types / parameters     = logo orange     constants = violet
#   builtins               = sky cyan        comments  = muted blue
# UI structure comes from the inherited base theme. Every colour in
# [palette] derives from the shared source of truth: identity slots map
# straight to it (diffs and diagnostics follow the VSCode theme's UI
# elements), Helix-only shades via declared mix/adjust formulas.

keyword = { fg = "aqua" }
"keyword.control" = { fg = "aqua" }
"keyword.control.import" = { fg = "aqua" }
"keyword.control.return" = { fg = "aqua" }
"keyword.function" = { fg = "aqua" }
"keyword.operator" = { fg = "aqua" }
"keyword.directive" = { fg = "aqua" }
operator = { fg = "aqua" }
punctuation = { fg = "fg" }
"punctuation.delimiter" = { fg = "aqua" }
tag = { fg = "aqua" }
"constant.character.escape" = { fg = "aqua" }

function = { fg = "light-green" }
"function.builtin" = { fg = "cyan" }
"function.macro" = { fg = "light-green" }
attribute = { fg = "light-green", modifiers = ["italic"] }

string = { fg = "yellow" }
"string.regexp" = { fg = "yellow" }

type = { fg = "orange", modifiers = ["italic"] }
"type.builtin" = { fg = "orange", modifiers = ["italic"] }
constructor = { fg = "orange" }
"variable.parameter" = { fg = "orange", modifiers = ["italic"] }

constant = { fg = "purple" }
"constant.builtin" = { fg = "purple" }
"variable.builtin" = { fg = "cyan", modifiers = ["italic"] }
"variable.other.member" = { fg = "fg" }
namespace = { fg = "fg" }

"comment.block.documentation" = { fg = "comment", modifiers = ["italic"] }
"comment.line.documentation" = { fg = "comment", modifiers = ["italic"] }

"markup.heading" = { fg = "purple", modifiers = ["bold"] }
"markup.link" = { fg = "cyan", underline = { style = "line" } }
"markup.list" = { fg = "cyan" }
"markup.raw" = { fg = "light-green" }
"markup.quote" = { fg = "yellow", modifiers = ["italic"] }

"diff.plus" = { fg = "light-green" }
"diff.minus" = { fg = "red" }
"diff.delta" = { fg = "orange" }

[palette]
red              = "#e2876b" # rust / logo-edge red
orange           = "#eabc77" # logo orange — types, parameters
yellow           = "#e0db77" # logo gold — strings
light-green      = "#95d776" # glowing hand green — functions
green            = "#9fbee2" # pale tube glow (unused member slot)
aqua             = "#639dd8" # electric tube blue — keywords, operators
teal             = "#658ec0" # slate blue — markup, hints
turquoise        = "#9eb2d3" # muted hangar blue
light-cyan       = "#c6e0f8" # ice glow
cyan             = "#98c1ea" # sky cyan — builtins
blue             = "#85bbed" # bright tube blue — UI accents, labels
purple           = "#9f70d8" # softened violet — constants, headings
magenta          = "#e48db4" # sarcophagus pink — select mode
comment          = "#6a75ab" # muted blue shading
black            = "#202b52" # raised surface blue

add              = "#95d776" # as VS Code gitDecoration.added
change           = "#98c1ea" # as VS Code gitDecoration.modified
delete           = "#e2876b" # as VS Code gitDecoration.deleted

error            = "#e2876b" # as VS Code editorError
info             = "#98c1ea" # as VS Code editorInfo
hint             = "#658ec0"

fg               = "#d3e0f0" # pale blue highlight white
fg-dark          = "#b0c0db"
fg-gutter        = "#2c3250" # whitespace marks — flattened editorWhitespace
fg-linenr        = "#6a75ab" # as VS Code editorLineNumber
fg-selected      = "#1b2556" # menu selection bg — as VS Code list selection
border           = "#0b1029"
border-highlight = "#639dd8"
bg               = "#141b3d" # hangar deep blue
bg-inlay         = "#18204a" # flattened list.focusBackground
bg-selection     = "#1b2556"
bg-menu          = "#0e1430" # statusline, popups
bg-focus         = "#242f63"
