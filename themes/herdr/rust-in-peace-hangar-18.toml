# rust-in-peace-hangar-18 — a herdr theme from the Megadeth "Rust in Peace" cover palette.
# Generated from the src/ palettes by scripts/targets/herdr.py (just build-themes).
# Do not edit by hand: edit the palette and rebuild.
# Merge this into your herdr config: https://herdr.dev/docs/configuration/#theme
#
# Recolours the catppuccin base theme via [theme.custom] overrides; any token
# not set here falls through to catppuccin. The accent is the cover's electric
# tube blue (the theme signature); panel_bg sits sunken below content, as VS
# Code's chrome does.
# Tip: set panel_bg = "reset" to let panels follow your terminal background.
# Note: [theme.custom] is a single global block, so herdr's appearance
# auto-switch ([theme] dark_name/light_name) can't pair two flavors — merge
# the overrides of just one.

[theme]
name = "catppuccin"

[theme.custom]
accent      = "#639dd8" # primary accent — tube blue, the theme signature
panel_bg    = "#0e1430" # tab + status bar band — sunken below content, as VS Code chrome
surface0    = "#242f63" # raised surface — selected rows, inactive tab chips
surface1    = "#3462a8" # highest surface — VS Code button blue
surface_dim = "#202b52" # base surface — active row, dividers, seams
overlay0    = "#6a75ab" # muted UI lines, borders
overlay1    = "#b0c0db" # brighter UI lines
text        = "#d3e0f0" # primary text
subtext0    = "#b0c0db" # secondary text
mauve       = "#9f70d8" # softened violet — constants
green       = "#95d776" # glowing hand green
yellow      = "#e0db77" # logo gold
red         = "#e2876b" # rust / logo-edge red
blue        = "#85bbed" # bright tube blue
teal        = "#98c1ea" # sky cyan
peach       = "#eabc77" # logo orange
